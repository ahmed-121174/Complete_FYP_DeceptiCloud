{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card form-card">
    <div style="text-align:center;margin-bottom:2rem;">
        <div class="brand-icon" style="width:56px;height:56px;margin:0 auto 1rem;font-size:1.5rem;"></div>
        <h2>Create Account</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;">Join {{ site.name }} today</p>
    </div>

    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/register">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Your full name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password"
                required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Create Account</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-muted);">
        Already have an account? <a href="/login" style="color:var(--primary);">Sign in</a>
    </p>
</div>
{% endblock %}
